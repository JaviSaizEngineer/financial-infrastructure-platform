services:

  postgres:
    image: postgres:15
    container_name: collateral-db
    environment:
      POSTGRES_DB: collateral
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    networks:
      - collateral-net

  collateral-service:
    image: javisaizengineer/collateral-service:5
    container_name: collateral-service
    depends_on:
      - postgres
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collateral
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8080:8080"
    networks:
      - collateral-net

networks:
  collateral-net: