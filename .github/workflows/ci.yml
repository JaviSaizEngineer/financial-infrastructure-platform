name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:

      #Descargar código
      - name: Checkout code
        uses: actions/checkout@v4

      #Java
      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      #Build Spring Boot
      - name: Build Spring Boot
        run: |
          cd collateral-service
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      #Build Docker image (VERSIONADA)
      - name: Build Docker image
        run: |
          docker build \
          -t javisaizengineer/collateral-service:${{ github.run_number }} \
          -t javisaizengineer/collateral-service:latest \
          ./collateral-service

      #Login DockerHub
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      #Push imágenes
      - name: Push Docker images
        run: |
          docker push javisaizengineer/collateral-service:${{ github.run_number }}
          docker push javisaizengineer/collateral-service:latest