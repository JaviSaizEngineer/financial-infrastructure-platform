name: Trade Service CI

on:
  push:
    paths:
      - 'trade-service/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Build
        run: |
          cd trade-service
          ./mvnw clean package -DskipTests

      - name: Docker login
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build image
        run: docker build -t javisaizengineer/trade-service:${{ github.run_number }} trade-service

      - name: Push image
        run: docker push javisaizengineer/trade-service:${{ github.run_number }}