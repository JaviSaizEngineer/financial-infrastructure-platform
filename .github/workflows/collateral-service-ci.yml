name: Collateral Service CI

on:
  push:
    paths:
      - 'collateral-service/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: |
          cd collateral-service
          ./mvnw clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t javisaizengineer/collateral-service:${{ github.run_number }} collateral-service
      - run: docker push javisaizengineer/collateral-service:${{ github.run_number }}