name: Deploy Infrastructure

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      # ---------------------------
      # Setup Java
      # ---------------------------
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      # ---------------------------
      # Build microservices (Maven)
      # ---------------------------
      - name: Build trade-service
        run: mvn -B clean package -DskipTests
        working-directory: ./trade-service

      - name: Build collateral-service
        run: mvn -B clean package -DskipTests
        working-directory: ./collateral-service

      - name: Build pricing-service
        run: mvn -B clean package -DskipTests
        working-directory: ./pricing-service

      - name: Build api-gateway
        run: mvn -B clean package -DskipTests
        working-directory: ./api-gateway

      # ---------------------------
      # Install kubectl
      # ---------------------------
      - name: Install kubectl
        run: |
          curl -LO "https://dl.k8s.io/release/$(curl -Ls https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
          chmod +x kubectl
          sudo mv kubectl /usr/local/bin/

      # ---------------------------
      # Install kind
      # ---------------------------
      - name: Install kind
        run: |
          curl -Lo ./kind https://kind.sigs.k8s.io/dl/latest/kind-linux-amd64
          chmod +x ./kind
          sudo mv ./kind /usr/local/bin/kind

      # ---------------------------
      # Create cluster
      # ---------------------------
      - name: Create kind cluster
        run: kind create cluster

      # ---------------------------
      # Build Docker images
      # ---------------------------
      - name: Build Docker images
        run: |
          docker build -t trade-service:latest ./trade-service
          docker build -t collateral-service:latest ./collateral-service
          docker build -t pricing-service:latest ./pricing-service
          docker build -t api-gateway:latest ./api-gateway

      # ---------------------------
      # Load images into kind
      # ---------------------------
      - name: Load images into kind
        run: |
          kind load docker-image trade-service:latest
          kind load docker-image collateral-service:latest
          kind load docker-image pricing-service:latest
          kind load docker-image api-gateway:latest

      # ---------------------------
      # Apply Kubernetes manifests
      # ---------------------------
      - name: Apply Kubernetes manifests
        run: kubectl apply -f k8s/

      # ---------------------------
      # Wait for deployments
      # ---------------------------
      - name: Wait for deployments
        run: |
          kubectl wait --for=condition=available deployment/api-gateway --timeout=180s
          kubectl wait --for=condition=available deployment/collateral-service --timeout=180s
          kubectl wait --for=condition=available deployment/pricing-service --timeout=180s
          kubectl wait --for=condition=available deployment/trade-service --timeout=180s

      # ---------------------------
      # Debug if fails
      # ---------------------------
      - name: Debug pods (if failure)
        if: failure()
        run: |
          kubectl get pods -A
          kubectl describe pods