name: API Gateway CI

on:
  push:
    paths:
      - 'api-gateway/**'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - run: |
          cd api-gateway
          ./mvnw clean package -DskipTests

      - uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - run: docker build -t javisaizengineer/api-gateway:latest api-gateway
      - run: docker push javisaizengineer/api-gateway:latest