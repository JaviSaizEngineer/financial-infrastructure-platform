name: API Gateway CI

on:
  push:
    paths:
      - "api-gateway/**"
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Build JAR
        run: |
          cd api-gateway
          chmod +x mvnw
          ./mvnw clean package -DskipTests

      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build & Push Image
        run: |
          docker build -t javisaizengineer/api-gateway:${{ github.run_number }} ./api-gateway
          docker push javisaizengineer/api-gateway:${{ github.run_number }}