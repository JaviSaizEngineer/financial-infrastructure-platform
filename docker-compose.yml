version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: collateral-db
    restart: always
    environment:
      POSTGRES_DB: collateral
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  collateral-service:
    build: ./collateral-service
    container_name: collateral-service
    restart: always
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collateral
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

volumes:
  postgres_data: