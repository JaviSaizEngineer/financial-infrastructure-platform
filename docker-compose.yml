version: "3.8"

services:

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: admin
      POSTGRES_DB: collateral
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  collateral-service:
    build: ./collateral-service
    container_name: collateral-service
    depends_on:
      - postgres
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/collateral
      SPRING_DATASOURCE_USERNAME: admin
      SPRING_DATASOURCE_PASSWORD: admin

  pricing-service:
    build: ./pricing-service
    container_name: pricing-service
    ports:
      - "8081:8081"

  trade-service:
    build: ./trade-service
    container_name: trade-service
    depends_on:
      - pricing-service
      - collateral-service
    ports:
      - "8082:8082"

  api-gateway:
    build: ./api-gateway
    container_name: api-gateway
    depends_on:
      - trade-service
      - pricing-service
      - collateral-service
    ports:
      - "8085:8085"

volumes:
  postgres_data: